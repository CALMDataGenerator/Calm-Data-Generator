name: Version Compatibility

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e "."

    - name: Run Tests
      run: |
        pytest tests/ \
          --ignore=tests/test_stream_block_generator.py \
          --ignore=tests/test_real_block_generator.py \
          --ignore=tests/test_clinic_block_generator.py \
          --ignore=tests/test_scvi_quality_regression.py \
          --ignore=tests/test_anndata_support.py \
          --ignore=tests/test_differentiation_factor.py \
          --ignore=tests/test_timeseries_real.py \
          --ignore=tests/test_timeseries_extended.py \
          -q
